<p-toast key="globalMessage"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="w-full flex flex-col gap-4 animate-fade-in">

  <div class="bg-white rounded-xl shadow-2xs border border-stone-200/60 overflow-hidden">
    <p-table #dt2 [value]="optionItemModel" [columns]="cols" [paginator]="true" [rows]="10"
      [rowsPerPageOptions]="[10, 20, 50]" styleClass="p-datatable-sm p-datatable-striped" [loading]="isLoading"
      [globalFilterFields]="['itemName', 'groupName', 'extraPrice']" [tableStyle]="{ 'min-width': '100%' }"
      selectionMode="single" dataKey="menuId">

      <ng-template pTemplate="caption">
        <div class="flex w-full justify-between items-center py-2 bg-stone-50/60 px-3 border-b border-stone-200/40">
          <p-iconfield iconPosition="left">
            <p-inputicon class="flex items-center">
              <i class="pi pi-search text-stone-400 text-[10px]"></i>
            </p-inputicon>
            <input pInputText type="text" (input)="dt2.filterGlobal($event.target.value, 'contains')"
              placeholder="Quick search option item..."
              class="text-[11px] py-1 px-2.5 pl-7 border border-stone-200 rounded-md bg-white w-52 focus:outline-none focus:border-amber-700 focus:ring-1 focus:ring-amber-700/20 transition-all" />
          </p-iconfield>
          <div>
            <button (click)="create()"
              class="bg-amber-700 hover:bg-amber-800 text-white font-bold px-3 py-1.5 rounded-lg text-[11px] flex items-center gap-1.5 shadow-sm transition-all active:scale-95">
              <i class="pi pi-plus text-[10px]"></i> Create Option Item
            </button>
          </div>

        </div>
      </ng-template>

      <ng-template pTemplate="header" let-columns>
        <tr class="bg-stone-50 text-stone-700 text-[11px] font-bold uppercase tracking-wider border-b border-stone-200">
          @for(col of columns; track col.field) {
          <th [pSortableColumn]="col.field" [class.text-right]="col.field === 'extraPrice' || col.field === 'price'"
            class="py-2.5 px-4 text-left font-bold text-stone-700">
            {{col.header}} <p-sortIcon [field]="col.field" class="text-[9px] text-stone-400"></p-sortIcon>
          </th>
          }
          <th class="w-24 text-center py-2.5 font-bold text-stone-700">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-rowData let-columns="columns">
        <tr [pSelectableRow]="rowData"
          class="border-b border-stone-100 text-stone-600 text-[11px] hover:bg-amber-50/20 transition-all">
          @for(col of columns; track col.field) {
          <td class="py-2 px-4 font-medium" [class.text-stone-800]="col.field === 'itemName'"
            [class.text-amber-800]="col.field === 'extraPrice'"
            [class.text-right]="col.field === 'extraPrice' || col.field === 'price'">

            @if(col.field === 'extraPrice') {
            {{ rowData[col.field] === 0 ? '0' : (rowData[col.field] ) }}
            } @else {
            {{ rowData[col.field] }}
            }
          </td>
          }
          <td class="text-center py-2">
            <div class="flex gap-1 justify-center">
              <button (click)="update(rowData)"
                class="text-stone-600 hover:text-amber-700 p-1 rounded hover:bg-stone-100 transition-colors"
                pTooltip="Edit" tooltipPosition="top">
                <i class="pi pi-pencil text-[10px]"></i>
              </button>
              <button (click)="delete(rowData)"
                class="text-stone-400 hover:text-rose-600 p-1 rounded hover:bg-stone-100 transition-colors"
                pTooltip="Delete" tooltipPosition="top">
                <i class="pi pi-trash text-[10px]"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog header="{{ isEdited ? '📋 Edit Option Item' : '📋 Create New Option Item' }}" [(visible)]="modelVisible"
  appendTo="body" maskStyleClass="backdrop-blur-xs bg-stone-900/20" [modal]="true" [draggable]="false"
  [resizable]="false" [style]="{ 'width': '420px', 'border-radius': '12px' }"
  [pt]="{ content: { class: 'overflow-y-visible p-5 flex flex-col gap-y-4' } }">

  <form [formGroup]="optionItemForm" (submit)="edit()">
    <div class="grid grid-cols-1 gap-y-3.5 text-[11px] font-sans">

      <div class="flex flex-col gap-1.5">
        <label class="font-bold text-stone-700 tracking-wide">Option Group <span class="text-rose-500">*</span></label>
        <p-select formControlName="optionGroupId" [options]="dropDownOptions" optionLabel="name" optionValue="id"
          placeholder="Select an Option Group" class="w-full text-[11px] custom-prime-select" appendTo="body"
          filterBy="name" [filter]="true" [showClear]="true">
        </p-select>
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="itemName" class="font-bold text-stone-700 tracking-wide">Item Name <span
            class="text-rose-500">*</span></label>
        <input pInputText id="itemName" formControlName="itemName"
          class="w-full text-[11px] p-2 border border-stone-200 rounded-md bg-stone-50/30 focus:outline-none focus:border-amber-700 transition-all"
          autocomplete="off" placeholder="e.g., Almond Milk, Extra Espresso Shot" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="extraPrice" class="font-bold text-stone-700 tracking-wide">Extra Price</label>
        <input pInputText id="extraPrice" formControlName="extraPrice"
          class="w-full text-[11px] p-2 border border-stone-200 rounded-md bg-stone-50/30 focus:outline-none focus:border-amber-700 transition-all"
          autocomplete="off" placeholder="e.g., 500" />
      </div>

      <div class="flex justify-end gap-2 mt-4 pt-3 border-t border-stone-100">
        <button type="button" (click)="modelVisible = false; selectedOptionItem=null"
          class="px-3 py-1.5 rounded-lg text-stone-500 hover:bg-stone-100 font-medium transition-colors">
          Cancel
        </button>
        <button type="submit"
          class="bg-amber-700 hover:bg-amber-800 text-white font-bold px-4 py-1.5 rounded-lg shadow-sm transition-all active:scale-95">
          {{ isEdited ? 'Update Changes' : 'Save Item' }}
        </button>
      </div>

    </div>
  </form>
</p-dialog>
