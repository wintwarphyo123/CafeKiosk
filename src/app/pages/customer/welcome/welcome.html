<div (click)="startOrdering()"
    class="h-screen w-screen relative flex flex-col justify-between items-center bg-[#1C1917] font-sans overflow-hidden cursor-pointer select-none p-4 sm:p-6">

    <div
        class="absolute -top-32 -left-32 w-72 h-72 sm:w-96 sm:h-96 bg-orange-600/30 rounded-full blur-3xl animate-pulse pointer-events-none">
    </div>
    <div class="absolute -bottom-32 -right-32 w-72 h-72 sm:w-96 sm:h-96 bg-amber-500/20 rounded-full blur-3xl animate-pulse pointer-events-none"
        style="animation-delay: 1.5s;"></div>

    <header class="pt-2 sm:pt-4 z-10 flex flex-col items-center shrink-0">
        <div
            class="flex items-center gap-2.5 bg-white/5 backdrop-blur-md px-5 py-1.5 rounded-full border border-white/10 shadow-2xl">
            <img src="/Rori_Cafe.png" alt="Rori'Cafe Logo"
                class="w-7 h-7 sm:w-8 sm:h-8 object-contain drop-shadow-md" />
            <span class="text-base sm:text-lg font-black tracking-wider text-white uppercase">Rori'Cafe</span>
        </div>
    </header>

    <main class="z-10 flex flex-col items-center text-center px-4 max-w-xl my-auto gap-3 sm:gap-5 shrink-0">
        <div class="relative group my-auto">
            <div class="absolute inset-0 bg-white/20 rounded-full blur-xl scale-125 pointer-events-none"></div>

            <img src="/Rori_Cafe.png" alt="Rori'Cafe Logo"
                class="relative w-40 h-40 sm:w-52 sm:h-52 object-contain drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] transform group-hover:scale-105 transition duration-500" />
        </div>

        <div>
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-black text-white tracking-tight leading-tight">
                Freshly Brewed <br />
                <span
                    class="bg-gradient-to-r from-orange-400 via-amber-300 to-yellow-500 bg-clip-text text-transparent">
                    Happiness in Every Cup
                </span>
            </h1>
            <p
                class="mt-2 text-xs sm:text-sm text-stone-400 font-medium max-w-sm mx-auto leading-relaxed line-clamp-2 sm:line-clamp-none">
                Indulge in our artisan coffees, handcrafted pastries, and refreshing treats made fresh daily.
            </p>
        </div>

        <div class="mt-2 sm:mt-4">
            <button
                class="relative inline-flex items-center gap-2.5 px-6 py-3 sm:px-8 sm:py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-black text-xs sm:text-sm uppercase tracking-widest rounded-xl sm:rounded-2xl shadow-[0_0_30px_rgba(234,88,12,0.4)] hover:shadow-[0_0_50px_rgba(234,88,12,0.6)] active:scale-95 transition-all duration-300 border border-orange-400/40">
                <span class="relative flex h-2.5 w-2.5">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-white"></span>
                </span>
                <span>Start to Order</span>
                <i class="pi pi-arrow-right text-xs"></i>
            </button>
        </div>
    </main>

    <footer class="pb-2 sm:pb-4 z-10 text-center shrink-0">
        <p
            class="text-[10px] sm:text-[11px] font-bold text-stone-500 tracking-widest uppercase flex items-center justify-center gap-2">
            <span>☕ SmartCafe Kiosk Self-Service System</span>
        </p>
    </footer>

</div>
