<p-toast key="globalMessage"></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="w-full max-w-7xl mx-auto p-4 text-[11px] font-sans selection:bg-amber-100">

    <div class="bg-white rounded-lg shadow-xs border border-stone-200 overflow-hidden">
        <p-table #dt2 [value]="optionGroupModel" [columns]="cols" [paginator]="true" [rows]="10"
            [rowsPerPageOptions]="[10, 20, 50]" styleClass="p-datatable-sm p-datatable-striped" [loading]="isLoading"
            [globalFilterFields]="['groupName']" [tableStyle]="{ 'min-width': '40rem' }" selectionMode="single"
            dataKey="categoryId">

            <ng-template pTemplate="caption">
                <div class="flex flex-wrap items-center gap-3 p-3 bg-stone-50/80 border-b border-stone-200/60 w-full">

                    <div class="w-full sm:w-auto">
                        <p-iconfield iconPosition="left">
                            <p-inputicon class="flex items-center">
                                <i class="pi pi-search text-stone-400 text-[11px]"></i>
                            </p-inputicon>
                            <input pInputText type="text"
                                (input)="dt2.filterGlobal($any($event.target).value, 'contains')"
                                placeholder="Quick search..."
                                class="text-[11px] h-[30px] pl-7 pr-2.5 border border-stone-200 rounded-lg bg-white w-full sm:w-48 focus:outline-none focus:border-amber-700 focus:ring-1 focus:ring-amber-700/20 transition-all text-stone-700 shadow-xs placeholder:text-stone-400" />
                        </p-iconfield>
                    </div>

                    

                    <div class="w-full sm:w-auto sm:ml-auto">
                        <button type="button" (click)="create()"
                            class="bg-amber-700 hover:bg-amber-800 text-white font-semibold px-3 h-[30px] rounded-lg text-[11px] flex items-center justify-center gap-1.5 shadow-sm transition-all whitespace-nowrap w-full sm:w-auto">
                            <i class="pi pi-plus text-[10px]"></i> Create Option Group
                        </button>
                    </div>

                </div>
            </ng-template>

            <ng-template pTemplate="header" let-columns>
                <tr class="bg-stone-100 text-stone-700 text-[11px] font-bold border-b border-stone-200">

                    @for(col of columns; track col.field) {
                    <th [pSortableColumn]="col.field" class="py-2 px-3 text-left">
                        {{col.header}} <p-sortIcon [field]="col.field" class="text-[9px]"></p-sortIcon>
                    </th>
                    }
                    
                    <th class="w-24 text-center py-2">Actions</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData let-columns="columns">
                <tr [pSelectableRow]="rowData"
                    class="border-b border-stone-100 text-stone-600 text-[11px] hover:bg-amber-50/30 transition-colors">

                    @for(col of columns; track col.field) {
                    <td class="py-1.5 px-3 font-medium text-stone-800">{{ rowData[col.field] }}</td>
                    }
                    
                    <td class="text-center py-1.5">
                        <div class="flex gap-1 justify-center">
                            <button (click)="update(rowData)"
                                class="text-stone-600 hover:text-amber-700 p-1 rounded hover:bg-stone-100 transition-colors"
                                pTooltip="Edit" tooltipPosition="top">
                                <i class="pi pi-pencil text-[11px]"></i>
                            </button>
                            <button (click)="delete(rowData)"
                                class="text-stone-400 hover:text-rose-600 p-1 rounded hover:bg-stone-100 transition-colors"
                                pTooltip="Delete" tooltipPosition="top">
                                <i class="pi pi-trash text-[11px]"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<p-dialog header="{{ isEdited ? '⚙️ Edit Option Group' : '⚙️ Create New Option Group' }}" [(visible)]="modelVisible"
    maskStyleClass="backdrop-blur-xs bg-stone-900/10"
    [breakpoints]="{ '1440px': '30vw', '1024px': '45vw', '768px': '65vw', '576px': '90vw' }" [modal]="true"
    [style]="{ 'min-width': '22vw' }" [draggable]="false" [resizable]="false" styleClass="custom-coffee-dialog">

    <form [formGroup]="optionGroupForm" (submit)="edit()">
        <div class="grid grid-cols-1 gap-y-3 p-1 text-[11px] font-sans">

            <div class="flex flex-col gap-1">
                <label for="groupName" class="font-bold text-stone-700 tracking-wide">
                    Option Group Name <span class="text-rose-500">*</span>
                </label>
                <input pInputText id="groupName" formControlName="groupName"
                    class="w-full text-[11px] p-2 border border-stone-200 rounded bg-stone-50/30 focus:outline-none focus:border-amber-700 transition-colors"
                    autocomplete="off" placeholder="e.g., Sweetness Level, Milk Options" />
            </div>

            <div class="flex justify-end gap-1.5 mt-3 pt-2.5 border-t border-stone-100">
                <button type="button" (click)="modelVisible = false; selectedGroup=null"
                    class="px-3 py-1.5 rounded text-stone-500 hover:bg-stone-100 font-medium transition-colors">
                    Cancel
                </button>

                <button type="submit"
                    class="bg-amber-700 hover:bg-amber-800 text-white font-bold px-4 py-1.5 rounded shadow-xs transition-colors">
                    {{ isEdited ? 'Update Changes' : 'Save Group' }}
                </button>
            </div>

        </div>
    </form>
</p-dialog>
